name: PropertyOnion Parity Audit

on:
  schedule:
    # Weekly Monday at 11 AM UTC (7 AM EST)
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      county:
        description: 'Single county to audit (leave empty for all 5)'
        required: false
        default: ''
      skip_po:
        description: 'Skip PropertyOnion scrape (ZW-only audit)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      dry_run:
        description: 'Dry run (no writes to Supabase)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
  SUPABASE_MGMT_TOKEN: ${{ secrets.SUPABASE_MGMT_TOKEN }}
  FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
  PROPERTYONION_EMAIL: ${{ secrets.PROPERTYONION_EMAIL }}
  PROPERTYONION_PASSWORD: ${{ secrets.PROPERTYONION_PASSWORD }}
  BROWSERLESS_API_KEY: ${{ secrets.BROWSERLESS_API_KEY }}
  APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}

jobs:
  parity-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install httpx playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Run Parity Audit
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.county }}" != "" ]; then
            ARGS="$ARGS --county ${{ github.event.inputs.county }}"
          fi
          if [ "${{ github.event.inputs.skip_po }}" == "true" ]; then
            ARGS="$ARGS --skip-po"
          fi
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m scrapers.parity_audit $ARGS

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: /tmp/po_login*.png
          retention-days: 3

      - name: Log blocker on failure
        if: failure()
        run: |
          echo "PARITY AUDIT FAILED — check workflow logs"
          if [ -n "$SUPABASE_SERVICE_KEY" ]; then
            python -c "
          from scrapers.shared import _run_sql
          _run_sql(\"\"\"
            INSERT INTO claude_context_checkpoints (pipeline_date, checkpoint_phase, errors)
            VALUES (CURRENT_DATE, '4', '[{\"step\": \"PARITY_AUDIT\", \"error\": \"workflow_failed\", \"attempts\": 1}]');
          \"\"\")
          print('Blocker logged to claude_context_checkpoints')
          "
          fi
