name: Propagate Secrets to QA Pipeline

on:
  workflow_dispatch:

jobs:
  propagate:
    runs-on: ubuntu-latest
    steps:
      - name: Install pynacl
        run: pip install pynacl requests --break-system-packages

      - name: Copy secrets to qa-agentic-pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SUPABASE_URL: "https://mocerqjnksmhcjzxrewo.supabase.co"
        run: |
          python3 << 'PYEOF'
          import json, requests, base64, os
          from nacl import encoding, public

          gh_token = os.environ["GH_TOKEN"]
          target_repo = "breverdbidder/qa-agentic-pipeline"

          secrets_to_copy = {
              "GITHUB_TOKEN_QA":          os.environ["GH_TOKEN"],
              "ANTHROPIC_API_KEY":        os.environ["ANTHROPIC_API_KEY"],
              "TELEGRAM_BOT_TOKEN":       os.environ["TELEGRAM_BOT_TOKEN"],
              "TELEGRAM_CHAT_ID":         os.environ["TELEGRAM_CHAT_ID"],
              "SUPABASE_URL":             os.environ["SUPABASE_URL"],
          }

          headers = {
              "Authorization": f"Bearer {gh_token}",
              "Accept": "application/vnd.github.v3+json",
              "Content-Type": "application/json"
          }

          # Get target repo public key
          r = requests.get(
              f"https://api.github.com/repos/{target_repo}/actions/secrets/public-key",
              headers=headers
          )
          key_data = r.json()
          pk = public.PublicKey(key_data["key"].encode(), encoding.Base64Encoder())
          box = public.SealedBox(pk)

          for name, value in secrets_to_copy.items():
              encrypted = base64.b64encode(box.encrypt(value.encode())).decode()
              resp = requests.put(
                  f"https://api.github.com/repos/{target_repo}/actions/secrets/{name}",
                  headers=headers,
                  json={"encrypted_value": encrypted, "key_id": key_data["key_id"]}
              )
              status = "✅" if resp.status_code in [201, 204] else f"❌ {resp.status_code}"
              print(f"{status} {name}")
          PYEOF
